name: Documents & Trust Layer CI

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * 1"

jobs:
  documents-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest

      - name: Run documents/profile/trust checks
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pytest -q \
            tests/test_driver_documents_contract_sync.py \
            tests/test_driver_documents_ui_smoke.py \
            tests/test_feed_publish_profile_navigation_flow.py \
            tests/test_documents_trust_docs_sync.py
