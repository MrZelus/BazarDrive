name: CI Driver Tab

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest

      - name: Run driver/feed related tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pytest -q \
            tests/test_driver_documents_contract_sync.py \
            tests/test_driver_documents_ui_smoke.py \
            tests/test_driver_tab_content_regression.py \
            tests/test_feed_xss_regression.py \
            tests/test_feed_api_validation.py \
            tests/test_db_guest_feed.py \
            tests/test_bot_moderation_flow.py
