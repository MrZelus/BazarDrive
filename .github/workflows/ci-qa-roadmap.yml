name: QA Roadmap CI

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

jobs:
  qa-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest

      - name: Run QA-critical tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pytest -q \
            tests/test_feed_api_validation.py \
            tests/test_driver_documents_contract_sync.py \
            tests/test_driver_documents_ui_smoke.py \
            tests/test_driver_status_theme_regression.py \
            tests/test_feed_xss_regression.py \
            tests/test_main_tabs_a11y.py
