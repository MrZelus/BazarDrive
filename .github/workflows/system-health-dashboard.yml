name: System Health Dashboard

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build-dashboard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Prepare data dir
        run: mkdir -p tmp/system_health

      - name: Fetch PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/pulls --paginate > tmp/system_health/prs.json

      - name: Fetch issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/issues --paginate > tmp/system_health/issues.json

      - name: Enrich PR data with file lists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python tools/enrich_pr_files.py

      - name: Generate dashboard report
        run: |
          python tools/system_health_dashboard.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: system-health-dashboard
          path: tmp/system_health_dashboard_report.md

      - name: Print report
        run: |
          cat tmp/system_health_dashboard_report.md
