name: System Health Dashboard

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build-dashboard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Prepare data dir
        run: mkdir -p tmp/system_health

      - name: Fetch PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/pulls --paginate > tmp/system_health/prs.json

      - name: Fetch issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/issues --paginate > tmp/system_health/issues.json

      - name: Enrich PR data with file lists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python - << 'PY'
import json
import subprocess
from pathlib import Path

prs = json.load(open('tmp/system_health/prs.json'))

for pr in prs:
    number = pr.get('number')
    if not number:
        continue
    try:
        out = subprocess.check_output([
            'gh', 'api', f"repos/${{ github.repository }}/pulls/{number}/files"
        ])
        files = json.loads(out)
        pr['changed_files_list'] = [f.get('filename') for f in files]
    except Exception:
        pr['changed_files_list'] = []

Path('tmp/system_health/prs.json').write_text(json.dumps(prs))
PY

      - name: Generate dashboard report
        run: |
          python tools/system_health_dashboard.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: system-health-dashboard
          path: tmp/system_health_dashboard_report.md

      - name: Print report
        run: |
          cat tmp/system_health_dashboard_report.md
