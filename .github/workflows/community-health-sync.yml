name: Community Health Check

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * 1"

jobs:
  check-community-files:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required files
        run: |
          missing=0

          [ -f CONTRIBUTING.md ] || { echo "Missing CONTRIBUTING.md"; missing=1; }
          [ -f CODE_OF_CONDUCT.md ] || { echo "Missing CODE_OF_CONDUCT.md"; missing=1; }
          [ -f .github/pull_request_template.md ] || { echo "Missing pull_request_template.md"; missing=1; }
          [ -d .github/ISSUE_TEMPLATE ] || { echo "Missing ISSUE_TEMPLATE directory"; missing=1; }

          if [ $missing -ne 0 ]; then
            echo "Community health files check failed"
            exit 1
          fi

      - name: Check contributing consistency
        run: |
          if [ -f docs/contributing.md ]; then
            echo "docs/contributing.md exists"
          else
            echo "docs/contributing.md missing"
            exit 1
          fi

          grep -q "docs/contributing.md" CONTRIBUTING.md || {
            echo "CONTRIBUTING.md must reference docs/contributing.md"
            exit 1
          }

      - name: Success
        run: echo "Community health files are valid"
