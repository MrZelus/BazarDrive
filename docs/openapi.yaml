openapi: 3.0.3
info:
  title: BazarDrive Feed API
  version: 1.0.0
  description: |
    Контракт API для сценариев ленты, профиля гостя, правил публикации и документов водителя.
    Поведение безопасности зависит от окружения:
    - `dev`: CORS открыт (`Access-Control-Allow-Origin: *`), write-методы работают без auth.
    - `prod`: CORS ограничен `CORS_ALLOWED_ORIGINS`, write-методы требуют `X-API-Key` или `Authorization: Bearer`.
      Для object-level прав на PATCH/DELETE постов и комментариев:
      автор может изменять только свои сущности, модераторские ключи/токены могут изменять любые.
servers:
  - url: http://localhost:8001
    description: Local development

tags:
  - name: Health
  - name: Feed
  - name: Profiles
  - name: Driver documents

paths:
  /health:
    get:
      tags: [Health]
      summary: Проверка здоровья API и БД
      responses:
        '200':
          description: API и БД доступны
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthOk'
        '503':
          description: API жив, но БД недоступна
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthDegraded'

  /api/feed/posts:
    get:
      tags: [Feed]
      operationId: listFeedPosts
      summary: Получить список постов гостевой ленты
      parameters:
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
          description: Размер страницы
        - in: query
          name: offset
          schema: { type: integer, minimum: 0, default: 0 }
          description: |
            Legacy offset-пагинация для обратной совместимости.
            Нельзя передавать одновременно с `cursor`.
        - in: query
          name: cursor
          schema: { type: string }
          description: |
            Курсор следующей страницы из поля `next_cursor` предыдущего ответа.
            Для сортировки `created_at DESC, id DESC` курсор возвращает более старые посты.
        - in: query
          name: guest_profile_id
          schema: { type: string }
          description: Идентификатор гостевого профиля для расчёта my_reaction
      responses:
        '200':
          description: Список постов
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeedPostsListResponse'
              examples:
                firstPage:
                  summary: Первая страница
                  value:
                    items:
                      - id: 120
                        author: Гость
                        text: Первый пост
                        likes: 3
                        reactions: { like: 3 }
                        media: []
                        created_at: "2026-03-20T12:00:00Z"
                    limit: 20
                    offset: 0
                    total: 120
                    next_cursor: "MjAyNi0wMy0yMFQxMjowMDowMFp8MTIw"
                    has_more: true
                nextPage:
                  summary: Следующая страница по cursor
                  value:
                    items:
                      - id: 119
                        author: Гость
                        text: Второй пост
                        likes: 0
                        reactions: {}
                        media: []
                        created_at: "2026-03-20T11:59:00Z"
                    limit: 20
                    offset: 0
                    total: 120
                    next_cursor: "MjAyNi0wMy0yMFQxMTo1OTowMFp8MTE5"
                    has_more: true
        '400':
          description: Некорректный cursor или одновременная передача cursor+offset
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '403':
          description: Origin заблокирован CORS-политикой (актуально для prod)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'

    post:
      tags: [Feed]
      operationId: createFeedPost
      summary: Создать пост в ленте
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateFeedPostRequest'
      responses:
        '201':
          description: Пост успешно создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeedPost'
        '400':
          description: Ошибка валидации
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '429':
          description: Слишком частые публикации
          headers:
            Retry-After:
              schema: { type: string }
              description: Количество секунд до следующей попытки
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RateLimitError'
        '401':
          description: В prod для write-операций не переданы или невалидны auth credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '403':
          description: Origin заблокирован CORS-политикой (актуально для prod)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '413':
          description: Размер payload превышает лимит `MAX_REQUEST_BYTES`
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PayloadTooLargeError'

  /api/feed/posts/{id}:
    patch:
      tags: [Feed]
      summary: Обновить существующий пост
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer, minimum: 1 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateFeedPostRequest'
      responses:
        '200':
          description: Пост обновлён
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeedPost'
        '400':
          description: Ошибка валидации
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '404':
          description: Пост не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '401':
          description: В prod для write-операций не переданы или невалидны auth credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '403':
          description: Нет прав на объект (не владелец и не модератор) или Origin заблокирован CORS-политикой
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '413':
          description: Размер payload превышает лимит `MAX_REQUEST_BYTES`
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PayloadTooLargeError'
    delete:
      tags: [Feed]
      summary: Удалить пост (автор или модератор)
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer, minimum: 1 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                guest_profile_id:
                  type: string
                  nullable: true
      responses:
        '200':
          description: Пост удалён
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                required: [ok]
        '400':
          description: Некорректный id поста
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '401':
          description: В prod для write-операций не переданы или невалидны auth credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '403':
          description: Недостаточно прав или Origin заблокирован CORS-политикой (актуально для prod)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '404':
          description: Пост не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '413':
          description: Размер payload превышает лимит `MAX_REQUEST_BYTES`
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PayloadTooLargeError'


  /api/feed/posts/{id}/react:
    post:
      tags: [Feed]
      summary: Поставить или заменить реакцию на пост
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer, minimum: 1 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetReactionRequest'
      responses:
        '200':
          description: Реакция установлена (идемпотентно)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostReactionsResponse'
        '400':
          description: Ошибка валидации реакции
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '401':
          description: В prod для write-операций не переданы или невалидны auth credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '404':
          description: Пост не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
    delete:
      tags: [Feed]
      summary: Снять реакцию с поста
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer, minimum: 1 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteReactionRequest'
      responses:
        '200':
          description: Реакция снята (идемпотентно)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostReactionsResponse'
        '400':
          description: Ошибка валидации
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '401':
          description: В prod для write-операций не переданы или невалидны auth credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '404':
          description: Пост не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'

  /api/feed/posts/{id}/reactions:
    get:
      tags: [Feed]
      summary: Получить агрегированные реакции по посту
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer, minimum: 1 }
        - in: query
          name: guest_profile_id
          schema: { type: string }
      responses:
        '200':
          description: Агрегаты и реакция текущего гостя
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostReactionsResponse'
        '404':
          description: Пост не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'

  /api/feed/posts/{id}/comments:
    get:
      tags: [Feed]
      summary: Получить комментарии к посту
      description: |
        Возвращает комментарии в порядке создания (ASC по `created_at`, затем `id`).
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer, minimum: 1 }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 200, default: 100 }
        - in: query
          name: offset
          schema: { type: integer, minimum: 0, default: 0 }
      responses:
        '200':
          description: Список комментариев
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommentsListResponse'
        '404':
          description: Пост не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '403':
          description: Origin заблокирован CORS-политикой (актуально для prod)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
    post:
      tags: [Feed]
      summary: Создать комментарий к посту
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer, minimum: 1 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCommentRequest'
      responses:
        '201':
          description: Комментарий создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comment'
        '400':
          description: Ошибка валидации
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '404':
          description: Пост не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '401':
          description: В prod для write-операций не переданы или невалидны auth credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '403':
          description: Origin заблокирован CORS-политикой (актуально для prod)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '413':
          description: Размер payload превышает лимит `MAX_REQUEST_BYTES`
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PayloadTooLargeError'

  /api/feed/posts/{id}/comments/{cid}:
    patch:
      tags: [Feed]
      summary: Изменить комментарий (автор или модератор)
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer, minimum: 1 }
        - in: path
          name: cid
          required: true
          schema: { type: integer, minimum: 1 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCommentRequest'
      responses:
        '200':
          description: Комментарий обновлён
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comment'
        '400':
          description: Ошибка валидации
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '403':
          description: Недостаточно прав
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '404':
          description: Пост или комментарий не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '401':
          description: В prod для write-операций не переданы или невалидны auth credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '413':
          description: Размер payload превышает лимит `MAX_REQUEST_BYTES`
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PayloadTooLargeError'
    delete:
      tags: [Feed]
      summary: Удалить комментарий (автор или модератор)
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer, minimum: 1 }
        - in: path
          name: cid
          required: true
          schema: { type: integer, minimum: 1 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                guest_profile_id:
                  type: string
                  nullable: true
      responses:
        '200':
          description: Комментарий удалён
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, example: true }
                required: [ok]
        '403':
          description: Недостаточно прав
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '404':
          description: Пост или комментарий не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '401':
          description: В prod для write-операций не переданы или невалидны auth credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '413':
          description: Размер payload превышает лимит `MAX_REQUEST_BYTES`
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PayloadTooLargeError'

  /api/feed/profiles:
    post:
      tags: [Profiles]
      operationId: upsertFeedProfile
      summary: Создать или обновить профиль гостя
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertGuestProfileRequest'
      responses:
        '201':
          description: Профиль сохранён
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GuestProfile'
        '400':
          description: Ошибка валидации
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '401':
          description: В prod для write-операций не переданы или невалидны auth credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '403':
          description: Origin заблокирован CORS-политикой (актуально для prod)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'

  /api/feed/profiles/{id}:
    get:
      tags: [Profiles]
      summary: Получить профиль гостя по ID
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, minLength: 1 }
      responses:
        '200':
          description: Профиль найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GuestProfile'
        '400':
          description: Некорректный ID профиля
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '404':
          description: Профиль не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '403':
          description: Origin заблокирован CORS-политикой (актуально для prod)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'

  /api/feed/approved:
    get:
      tags: [Feed]
      operationId: listApprovedFeed
      summary: Получить объединённую модерируемую ленту одобренных постов/объявлений
      description: |
        Возвращает публикации со статусом `approved`.
        Текущая реализация отдаёт до 50 записей и включает рекламные объявления.
      responses:
        '200':
          description: Одобренные публикации
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovedFeedResponse'
        '500':
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '403':
          description: Origin заблокирован CORS-политикой (актуально для prod)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'

  /api/feed/publication-rules:
    get:
      tags: [Feed]
      summary: Получить структурированные правила публикации для UI
      responses:
        '200':
          description: Правила публикации
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicationRules'
        '403':
          description: Origin заблокирован CORS-политикой (актуально для prod)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'

  /api/driver/documents:
    get:
      tags: [Driver documents]
      summary: Получить список документов водителя
      parameters:
        - in: query
          name: profile_id
          required: false
          schema: { type: string, default: driver-main }
      responses:
        '200':
          description: Список документов
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DriverDocumentListResponse'
        '403':
          description: Origin заблокирован CORS-политикой (актуально для prod)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'

    post:
      tags: [Driver documents]
      summary: Создать документ водителя
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DriverDocumentWriteRequest'
      responses:
        '201':
          description: Документ создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DriverDocument'
        '400':
          description: Ошибка валидации
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '409':
          description: Дубликат документа
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DuplicateDocumentError'
        '401':
          description: В prod для write-операций не переданы или невалидны auth credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '403':
          description: Origin заблокирован CORS-политикой (актуально для prod)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'

  /api/driver/documents/{id}:
    patch:
      tags: [Driver documents]
      summary: Обновить документ водителя
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer, minimum: 1 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DriverDocumentWriteRequest'
      responses:
        '200':
          description: Документ обновлён
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DriverDocument'
        '400':
          description: Ошибка валидации
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '404':
          description: Документ не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '401':
          description: В prod для write-операций не переданы или невалидны auth credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '403':
          description: Origin заблокирован CORS-политикой (актуально для prod)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'

    delete:
      tags: [Driver documents]
      summary: Удалить документ водителя
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer, minimum: 1 }
      responses:
        '200':
          description: Документ удалён
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                required: [ok]
        '400':
          description: Некорректный ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '404':
          description: Документ не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '401':
          description: В prod для write-операций не переданы или невалидны auth credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '403':
          description: Origin заблокирован CORS-политикой (актуально для prod)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: |
        Используется только в `prod` для write-запросов.
        Ключи из `MODERATOR_API_KEYS` считаются модераторскими.
    BearerAuth:
      type: http
      scheme: bearer
      description: |
        Используется только в `prod` для write-запросов.
        Токены из `MODERATOR_BEARER_TOKENS` считаются модераторскими.
  schemas:
    AuthErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              enum: [unauthorized, forbidden_origin]
            message:
              type: string
            request_id:
              type: string
          required: [code, message, request_id]
      required: [error]

    PayloadTooLargeError:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              example: payload_too_large
            message:
              type: string
              example: Payload Too Large
            max_request_bytes:
              type: integer
              minimum: 1
            request_id:
              type: string
          required: [code, message, max_request_bytes, request_id]
      required: [error]

    ErrorMessage:
      type: object
      properties:
        error:
          oneOf:
            - type: string
            - type: object
      required: [error]

    ValidationError:
      type: object
      properties:
        error:
          type: string
          example: validation_error
        fields:
          type: object
          additionalProperties:
            type: string
      required: [error, fields]

    DuplicateDocumentError:
      type: object
      properties:
        error:
          type: string
          example: duplicate_document
        message:
          type: string
        fields:
          type: object
          additionalProperties:
            type: string
      required: [error, message, fields]

    RateLimitError:
      type: object
      properties:
        error:
          type: string
        retry_after:
          type: integer
          minimum: 1
      required: [error, retry_after]

    HealthOk:
      type: object
      properties:
        status: { type: string, example: ok }
        process: { type: string, example: ok }
        database: { type: string, example: ok }
      required: [status, process, database]

    HealthDegraded:
      type: object
      properties:
        status: { type: string, example: degraded }
        process: { type: string, example: ok }
        database: { type: string, example: unavailable }
      required: [status, process, database]

    FeedPost:
      type: object
      properties:
        id: { type: integer }
        author: { type: string }
        text: { type: string }
        guest_profile_id: { type: string, nullable: true }
        likes: { type: integer, description: Количество like-реакций (обратная совместимость) }
        reactions:
          type: object
          additionalProperties: { type: integer }
          description: Агрегированные счётчики реакций по типам
        my_reaction: { type: string, nullable: true }
        image_url: { type: string, nullable: true }
        media:
          type: array
          description: |
            Новый контракт вложений (карусель/галерея). Для backward compatibility
            у legacy-постов из `image_url` backend формирует media из одного image-элемента.
          items:
            $ref: '#/components/schemas/FeedPostMedia'
        created_at: { type: string, format: date-time }
        updated_at: { type: string, nullable: true }
      required: [id, author, text, likes, reactions, media, created_at]

    FeedPostMedia:
      type: object
      properties:
        id: { type: integer, description: Идентификатор вложения (0 для legacy-fallback) }
        post_id: { type: integer }
        media_type:
          type: string
          enum: [image, video]
        url:
          type: string
          description: URL вложения (http/https либо локальный /uploads/feed/ для image)
        position:
          type: integer
          minimum: 0
        created_at:
          type: string
          nullable: true
          format: date-time
      required: [media_type, url, position]

    FeedPostsListResponse:
      type: object
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/FeedPost' }
        limit: { type: integer }
        offset: { type: integer }
        total: { type: integer }
        next_cursor:
          type: string
          nullable: true
          description: Курсор для следующей страницы или null если страниц больше нет
        has_more:
          type: boolean
          description: Признак наличия следующей страницы
      required: [items, limit, offset, total, next_cursor, has_more]

    SetReactionRequest:
      type: object
      properties:
        guest_profile_id: { type: string }
        type: { type: string, enum: [like, dislike, fire, heart, laugh, wow] }
      required: [guest_profile_id, type]

    DeleteReactionRequest:
      type: object
      properties:
        guest_profile_id: { type: string }
      required: [guest_profile_id]

    PostReactionsResponse:
      type: object
      properties:
        post_id: { type: integer }
        likes: { type: integer }
        my_reaction: { type: string, nullable: true }
        reactions:
          type: object
          additionalProperties: { type: integer }
      required: [post_id, likes, reactions, my_reaction]

    Comment:
      type: object
      properties:
        id: { type: integer }
        post_id: { type: integer }
        guest_profile_id: { type: string, nullable: true }
        author: { type: string }
        text: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
      required: [id, post_id, author, text, created_at, updated_at]

    CommentsListResponse:
      type: object
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/Comment' }
        limit: { type: integer }
        offset: { type: integer }
        total: { type: integer }
      required: [items, limit, offset, total]

    CreateCommentRequest:
      type: object
      properties:
        guest_profile_id: { type: string, nullable: true }
        author: { type: string, minLength: 2, maxLength: 40 }
        text: { type: string, minLength: 1, maxLength: 300 }
      required: [author, text]

    UpdateCommentRequest:
      type: object
      properties:
        guest_profile_id: { type: string }
        text: { type: string, minLength: 1, maxLength: 300 }
      required: [text]

    CreateFeedPostRequest:
      type: object
      properties:
        author: { type: string, minLength: 2, maxLength: 40 }
        text: { type: string }
        image_url:
          type: string
          nullable: true
          description: Legacy-поле для старых клиентов. Если media[] не передан, преобразуется в media из одного image.
        media:
          type: array
          maxItems: 8
          description: Новый контракт медиа-вложений (1..N элементов).
          items:
            $ref: '#/components/schemas/FeedPostMedia'
        guest_profile:
          type: object
          description: Встроенный payload гостевого профиля (опционально)
        author_profile_id:
          type: string
          nullable: true
      required: [author, text]
      example:
        author: "Иван"
        text: "Пост с каруселью"
        media:
          - media_type: image
            url: "https://cdn.example.com/post-1.jpg"
            position: 0
          - media_type: image
            url: "https://cdn.example.com/post-2.jpg"
            position: 1

    UpdateFeedPostRequest:
      type: object
      properties:
        guest_profile_id:
          type: string
          nullable: true
          description: Требуется для автора (не модератора) при object-level проверке прав
        author: { type: string, minLength: 2, maxLength: 40 }
        text: { type: string }
        image_url:
          type: string
          nullable: true
          description: Legacy-поле для обратной совместимости
        media:
          type: array
          maxItems: 8
          items:
            $ref: '#/components/schemas/FeedPostMedia'
      required: [author, text]
      example:
        author: "Иван"
        text: "Обновлённый пост с видео"
        media:
          - media_type: video
            url: "https://cdn.example.com/post.mp4"
            position: 0

    GuestProfile:
      type: object
      properties:
        id: { type: string }
        role: { type: string, example: guest_author }
        name: { type: string }
        email: { type: string, nullable: true }
        phone: { type: string, nullable: true }
        avatar_url: { type: string, nullable: true }
        about: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
      required: [id, role, name, created_at, updated_at]

    UpsertGuestProfileRequest:
      type: object
      properties:
        id:
          type: string
          description: Если не передан, генерируется автоматически на backend
        role:
          type: string
          default: guest_author
        name: { type: string }
        email: { type: string, nullable: true }
        phone: { type: string, nullable: true }
        avatar_url: { type: string, nullable: true }
        about: { type: string, nullable: true }
      required: [name]

    ApprovedFeedResponse:
      type: object
      properties:
        items:
          type: array
          items:
            type: object
      required: [items]

    PublicationRules:
      type: object
      additionalProperties: true

    DriverDocument:
      type: object
      properties:
        id: { type: integer }
        profile_id: { type: string }
        type: { type: string }
        number: { type: string }
        issue_date: { type: string, nullable: true }
        expiry_date: { type: string, nullable: true }
        issuer: { type: string, nullable: true }
        notes: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
      required: [id, profile_id, type, number, created_at, updated_at]

    DriverDocumentWriteRequest:
      type: object
      properties:
        profile_id: { type: string }
        type: { type: string }
        number: { type: string }
        issue_date: { type: string, nullable: true }
        expiry_date: { type: string, nullable: true }
        issuer: { type: string, nullable: true }
        notes: { type: string, nullable: true }
      required: [profile_id, type, number]

    DriverDocumentListResponse:
      type: object
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/DriverDocument' }
        profile_id: { type: string }
        total: { type: integer }
      required: [items, profile_id, total]
