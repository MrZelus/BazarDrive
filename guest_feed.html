<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Лента постов</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 text-slate-900 antialiased font-sans">
  <main class="mx-auto w-full max-w-[600px] px-4 py-6 sm:py-8">
    <section class="mb-4 rounded-2xl bg-white p-4 shadow-sm">
      <label for="newPostInput" class="mb-2 block text-sm font-medium text-slate-500">Что нового?</label>
      <div class="flex items-center gap-3">
        <input
          id="newPostInput"
          type="text"
          placeholder="Поделитесь мыслью..."
          class="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm outline-none transition focus:border-slate-400 focus:bg-white"
        />
        <button
          id="publishBtn"
          type="button"
          class="rounded-xl bg-slate-900 px-4 py-3 text-sm font-medium text-white transition hover:bg-slate-700"
        >
          Опубликовать
        </button>
      </div>
    </section>

    <section id="feed" class="space-y-3"></section>
  </main>

  <script>
    const posts = [
      {
        id: 1,
        author: 'Анна К.',
        avatar: 'https://i.pravatar.cc/80?img=5',
        publishedAt: '20 мар 2026, 22:14',
        text: 'Сегодня завершила редизайн профиля. Минималистичный подход реально делает интерфейс легче для восприятия.',
        image: 'https://images.unsplash.com/photo-1516383740770-fbcc5ccbece0?auto=format&fit=crop&w=1200&q=80',
        likes: 24,
        comments: 6,
        reposts: 3,
      },
      {
        id: 2,
        author: 'Максим И.',
        avatar: 'https://i.pravatar.cc/80?img=15',
        publishedAt: '20 мар 2026, 21:02',
        text: 'Тестирую адаптивную ленту на Tailwind. На мобильном всё выглядит аккуратно и читабельно.',
        image: '',
        likes: 12,
        comments: 2,
        reposts: 1,
      },
      {
        id: 3,
        author: 'София Л.',
        avatar: 'https://i.pravatar.cc/80?img=32',
        publishedAt: '20 мар 2026, 19:48',
        text: 'Добавила в посты карточки с hover-эффектом и мягкими тенями. Получилось в стиле Notion/Threads.',
        image: 'https://images.unsplash.com/photo-1522202176988-66273c2fd55f?auto=format&fit=crop&w=1200&q=80',
        likes: 41,
        comments: 11,
        reposts: 7,
      },
    ];

    const feedEl = document.getElementById('feed');
    const newPostInput = document.getElementById('newPostInput');
    const publishBtn = document.getElementById('publishBtn');

    function interactionButton(icon, value, label) {
      return `
        <button type="button" aria-label="${label}" class="group inline-flex items-center gap-1.5 rounded-lg px-2.5 py-1.5 text-sm text-slate-500 transition hover:bg-slate-100 hover:text-slate-800">
          ${icon}
          <span>${value}</span>
        </button>
      `;
    }

    function renderFeed() {
      feedEl.innerHTML = posts.map((post) => `
        <article class="rounded-xl bg-white p-4 shadow-sm transition hover:-translate-y-0.5 hover:shadow-md">
          <header class="mb-3 flex items-center justify-between">
            <div class="flex items-center gap-3">
              <img src="${post.avatar}" alt="${post.author}" class="h-10 w-10 rounded-full object-cover" loading="lazy" />
              <div>
                <p class="text-sm font-semibold text-slate-900">${post.author}</p>
                <p class="text-xs text-slate-500">${post.publishedAt}</p>
              </div>
            </div>
          </header>

          <p class="mb-3 text-[15px] leading-7 text-slate-800">${post.text}</p>

          ${post.image ? `<img src="${post.image}" alt="Изображение поста" class="mb-3 max-h-[420px] w-full rounded-xl object-cover" loading="lazy" />` : ''}

          <footer class="flex items-center gap-1 border-t border-slate-100 pt-2">
            ${interactionButton(
              '<svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 21s-7-4.35-7-10a4 4 0 0 1 7-2.65A4 4 0 0 1 19 11c0 5.65-7 10-7 10Z"/></svg>',
              post.likes,
              'Лайк'
            )}
            ${interactionButton(
              '<svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M8 10h8M8 14h5"/><path d="M21 12a8 8 0 0 1-8 8H5l2.1-2.8A8 8 0 1 1 21 12Z"/></svg>',
              post.comments,
              'Комментарий'
            )}
            ${interactionButton(
              '<svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="m4 12 7-7v4h6a3 3 0 0 1 3 3v7"/><path d="m20 12-7 7v-4H7a3 3 0 0 1-3-3V5"/></svg>',
              post.reposts,
              'Репост'
            )}
          </footer>
        </article>
      `).join('');
    }

    function addNewPost() {
      const text = newPostInput.value.trim();
      if (!text) return;

      posts.unshift({
        id: Date.now(),
        author: 'Вы',
        avatar: 'https://i.pravatar.cc/80?img=12',
        publishedAt: new Date().toLocaleString('ru-RU', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' }),
        text,
        image: '',
        likes: 0,
        comments: 0,
        reposts: 0,
      });

      newPostInput.value = '';
      renderFeed();
    }

    publishBtn.addEventListener('click', addNewPost);
    newPostInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') {
        event.preventDefault();
        addNewPost();
      }
    });

    renderFeed();
  </script>
</body>
</html>
